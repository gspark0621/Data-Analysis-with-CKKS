##### Prefix 키 변경: Ctrl-b → Ctrl-a
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

##### 마우스 사용
set -g mouse on

set -g status-left '#{?client_prefix,#[bg=red,fg=white,bold] PREFIX #[default] ,}#[bold] #S #[default]'
set -g status-right '#{?window_zoomed_flag,#[bold] ZOOM #[default] ,}#{pane_current_command} | #{pane_current_path} | %H:%M'
set -g window-status-current-format '#[reverse] #I:#W #[default]'
set -g window-status-format ' #I:#W '

##### Copy mode: ijkl movement
setw -g mode-keys vi

bind-key -T copy-mode-vi i send-keys -X cursor-up
bind-key -T copy-mode-vi k send-keys -X cursor-down
bind-key -T copy-mode-vi j send-keys -X cursor-left
bind-key -T copy-mode-vi l send-keys -X cursor-right

##### pane 이동: vim 방향키
bind j select-pane -L
bind k select-pane -D
bind i select-pane -U
bind l select-pane -R

##### pane 분할
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

##### 현재 경로에서 새 pane/window 열기
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### window 번호 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

##### 상태바 새로고침
set -g status-interval 3

##### 히스토리 길이 증가
set -g history-limit 100000

##### escape 딜레이 줄이기
set -sg escape-time 10

##### reload 단축키
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### 색상 지원
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"